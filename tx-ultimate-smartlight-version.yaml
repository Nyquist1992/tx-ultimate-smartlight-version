substitutions:
  name: kitchen-siwtch
  friendly_name: kitchen siwtch
#右側亮燈版本
  relay_count: "2"

  toggle_relay_1_on_touch: "false"
  toggle_relay_2_on_touch: "false"
  toggle_relay_3_on_touch: "false"

  vibra_time: 150ms
  button_on_time: 500ms
#狀態燈色更改BUTTON COLOR
  button_brightness: "0.4"
  button_color: "{100,77,56}"
#氣氛燈色更改Nightlight Color
  nightlight: "off"
  nightlight_brightness: "0.2"
  nightlight_color: "{100,100,100}"

  latitude: "23.523456°"
  longitude: "121.654321°"

  touch_brightness: "0.5"
  touch_color: "{100,60,0}"
  touch_effect: ""

  long_press_brightness: "0.7"
  long_press_color: "{100,100,100}"
  long_press_effect: ""

  multi_touch_brightness: "0.5"
  multi_touch_color: "{0,0,0}"
  multi_touch_effect: ""

  swipe_left_brightness: "0.5"
  swipe_left_color: "{80,80,50}"
  swipe_left_effect: ""

  swipe_right_brightness: "0.5"
  swipe_right_color: "{80,70,10}"
  swipe_right_effect: ""

  relay_1_pin: GPIO18
  relay_2_pin: GPIO17
  relay_3_pin: GPIO27
  relay_4_pin: GPIO23

  vibra_motor_pin: GPIO21
  pa_power_pin: GPIO26

  led_pin: GPIO13
  status_led_pin: GPIO33

  uart_tx_pin: GPIO19
  uart_rx_pin: GPIO22

  audio_lrclk_pin: GPIO4
  audio_bclk_pin: GPIO2
  audio_sdata_pin: GPIO15

  touchpanel_power_pin: GPIO5


esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: smarthomeyourself.tx_ultimate
    version: "1.0"

  on_boot:
    priority: -100
    then:
      - binary_sensor.template.publish:
          id: touchfield_1
          state: OFF
      - binary_sensor.template.publish:
          id: touchfield_2
          state: OFF
      - binary_sensor.template.publish:
          id: touchfield_3
          state: OFF
      - binary_sensor.template.publish:
          id: multi_touch
          state: OFF
      - binary_sensor.template.publish:
          id: swipe_left
          state: OFF
      - binary_sensor.template.publish:
          id: swipe_right
          state: OFF
      - binary_sensor.template.publish:
          id: long_press
          state: OFF
      - script.execute: refresh_led_default

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
#  hardware_uart: UART2
  level: DEBUG
  logs:
    binary_sensor: INFO
    light: INFO
    script: INFO
    switch: INFO
    tx_ultimate_touch: INFO
    uart_debug: INFO

dashboard_import:
  package_import_url: github://SmartHome-yourself/sonoff-tx-ultimate-for-esphome/tx_ultimate.yaml@main
  import_full_config: false

api:
  encryption:
    key: "fSieUGgj7wYZCfY7V6ds+4/cnMKo8ONmlmMUFS/GqyQ="

ota:
  - platform: esphome
    password: "4fac8daa4fbb75a3e61749232970981e"



wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Kitchen-Siwtch Fallback Hotspot"
    password: "Tz3WqUMFpR7f"

improv_serial:

captive_portal:

external_components:
#  - source: /config/esphome/my_components
  - source:
      type: git
      url: https://github.com/SmartHome-yourself/sonoff-tx-ultimate-for-esphome
      ref: main
    components: [tx_ultimate_touch]



globals:
  - id: nightlight_color
    type: int [3]
    restore_value: no
    initial_value: ${nightlight_color}
  - id: button_color
    type: int [3]
    restore_value: no
    initial_value: ${button_color}
  - id: long_press_color
    type: int [3]
    restore_value: no
    initial_value: ${long_press_color}
  - id: multi_touch_color
    type: int [3]
    restore_value: no
    initial_value: ${multi_touch_color}
  - id: swipe_left_color
    type: int [3]
    restore_value: no
    initial_value: ${swipe_left_color}
  - id: swipe_right_color
    type: int [3]
    restore_value: no
    initial_value: ${swipe_right_color}
  - id: touch_color
    type: int [3]
    restore_value: no
    initial_value: ${touch_color}



binary_sensor:
  - platform: template
    name: "Touchfield 1"
    id: touchfield_1
    on_press:
      - if:
          condition:
            lambda: "return ${toggle_relay_1_on_touch};"
          then:
            - switch.toggle: relay_1
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: touchfield_1
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Touchfield 2"
    id: touchfield_2
    on_press:
      - if:
          condition:
            lambda: "return ${toggle_relay_2_on_touch};"
          then:
            - switch.toggle: relay_2
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: touchfield_2
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Touchfield 3"
    id: touchfield_3
    on_press:
      - if:
          condition:
            lambda: "return ${toggle_relay_3_on_touch};"
          then:
            - switch.toggle: relay_3
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: touchfield_3
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Swipe left"
    id: swipe_left
    on_press:
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: swipe_left
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Swipe_right"
    id: swipe_right
    on_press:
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: swipe_right
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Multi Touch"
    id: multi_touch
    on_press:
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: multi_touch
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Long Press"
    id: long_press
    on_press:
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: long_press
          state: OFF
      - script.execute: refresh_led_default

switch:
  - platform: gpio
    id: relay_1
    name: "${friendly_name} L1"
    pin: ${relay_1_pin}
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: refresh_led_default
    on_turn_off:
      then:
        - script.execute: refresh_led_default

  - platform: gpio
    id: relay_2
    name: "${friendly_name} L2"
    pin: ${relay_2_pin}
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: refresh_led_default
    on_turn_off:
      then:
        - script.execute: refresh_led_default

  - platform: gpio
    id: relay_3
    name: "${friendly_name} L3"
    pin: ${relay_3_pin}
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: refresh_led_default
    on_turn_off:
      then:
        - script.execute: refresh_led_default

  - platform: gpio
    id: vibra
    pin: ${vibra_motor_pin}
    name: "${friendly_name} Vibration"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${vibra_time}
      - switch.turn_off: vibra

  - platform: gpio
    id: pa_power
    pin: ${pa_power_pin}
    name: "PA Power"
    internal: true
    restore_mode: ALWAYS_ON

  - platform: gpio
    name: "touch panel power"
    pin:
      number: ${touchpanel_power_pin}
      inverted: true
    id: touch_power
    internal: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "${friendly_name} Button Left Mode"
    id: button_left_mode_switch
    optimistic: true
    on_turn_on:
      - light.control:
          id: leds_button_left
          state: true
          brightness: ${button_brightness}
          red: !lambda "return id(button_color)[0]/255.0;"
          green: !lambda "return id(button_color)[1]/255.0;"
          blue: !lambda "return id(button_color)[2]/255.0;"
    on_turn_off:
      - light.control:
          id: leds_button_left
          brightness: ${nightlight_brightness}
          red: !lambda "return id(nightlight_color)[0]/100.0;"
          green: !lambda "return id(nightlight_color)[1]/100.0;"
          blue:  !lambda "return id(nightlight_color)[2]/100.0;"

  - platform: template
    name: "${friendly_name} Button Middle Mode"
    id: button_middle_mode_switch
    optimistic: true
    on_turn_on:
      - light.control:
          id: leds_button_middle
          state: true
          brightness: ${button_brightness}
          red: !lambda "return id(button_color)[0]/255.0;"
          green: !lambda "return id(button_color)[1]/255.0;"
          blue: !lambda "return id(button_color)[2]/255.0;"
    on_turn_off:
      - light.control:
          id: leds_button_middle
          brightness: ${nightlight_brightness}
          red: !lambda "return id(nightlight_color)[0]/100.0;"
          green: !lambda "return id(nightlight_color)[1]/100.0;"
          blue:  !lambda "return id(nightlight_color)[2]/100.0;"

#  - platform: template
#    name: "${friendly_name} Button Right Mode"
#    id: button_right_mode_switch
#    optimistic: true
#    on_turn_on:
#      - light.control:
#          id: leds_button_right
#          state: true
#          brightness: ${button_brightness}
#          red: !lambda "return id(button_color)[0]/255.0;"
#          green: !lambda "return id(button_color)[1]/255.0;"
#          blue: !lambda "return id(button_color)[2]/255.0;"
#    on_turn_off:
#      - light.control:
#          id: leds_button_right
#          brightness: ${nightlight_brightness}
#          red: !lambda "return id(nightlight_color)[0]/100.0;"
#          green: !lambda "return id(nightlight_color)[1]/100.0;"
#          blue:  !lambda "return id(nightlight_color)[2]/100.0;"#

  # 夜燈開關：HA 控制此開關來決定 leds_top 狀態
  # ON = 夜間模式（leds_top 熄滅），OFF = 夜燈常亮（leds_top 白色20%）
  - platform: template
    name: "${friendly_name} Nightlight"
    id: nightlight_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        # 夜間模式開啟：中止所有觸控腳本，熄滅 leds_top
        - script.stop: led_on_touch
        - script.stop: led_on_swipe_left
        - script.stop: led_on_swipe_right
        - script.stop: led_on_long_touch
        - script.stop: led_on_full_touch
        - light.turn_off:
            id: leds_top
    on_turn_off:
      then:
        # 夜間模式關閉：中止所有觸控腳本，點亮 leds_top 白色20%
        - script.stop: led_on_touch
        - script.stop: led_on_swipe_left
        - script.stop: led_on_swipe_right
        - script.stop: led_on_long_touch
        - script.stop: led_on_full_touch
        - light.turn_on:
            id: leds_top
            brightness: 0.2
            red: 1.0
            green: 1.0
            blue: 1.0

  - platform: restart
    name: "${friendly_name} Restart"

light:
  - platform: neopixelbus
    type: GRB
    variant: WS2811
    pin: ${led_pin}
    num_leds: 32
    name: "NeoPixel Light"
    id: leds
    default_transition_length: 0s
    effects:
      - addressable_rainbow:
          name: "Rainbow"
          speed: 30
          width: 8
      - pulse:
          name: "Pulse"
          transition_length: 1.4s
          update_interval: 1s

    on_turn_off:
      then:
        - script.execute: refresh_led_default

#  - platform: partition
#    name: "LEDs Button right"
#    id: leds_button_right
#    internal: false
#      - id: leds
#        from: 32
#        to: 32

  - platform: partition
    name: "LEDs Button middle"
    id: leds_button_middle
    internal: false
    segments:
      - id: leds
        from: 4
        to: 8

  - platform: partition
    name: "LEDs Button left"
    id: leds_button_left
    internal: false
    segments:
      - id: leds
        from: 0
        to: 3
      - id: leds
        from: 31
        to: 31

#  - platform: partition
#    name: "LEDs Nightlight"
#    id: leds_nightlight
#    internal: true
#    segments:
#      - id: leds
#        from: 9
#        to: 27

  - platform: partition
    name: "LEDs Top"
    id: leds_top
    internal: false
    segments:
      - id: leds
        from: 9
        to: 30
    effects:
      - addressable_scan:
          name: "Scan"
      - addressable_rainbow:
          name: "Rainbow"
          speed: 10
          width: 20

media_player:
  - platform: i2s_audio
    id: media_out
    name: ${friendly_name} Player
    dac_type: external
    i2s_dout_pin: ${audio_sdata_pin}
    i2s_audio_id: audio_i2s
    i2s_comm_fmt: lsb
    mode: mono

i2s_audio:
  id: audio_i2s
  i2s_lrclk_pin: ${audio_lrclk_pin}
  i2s_bclk_pin: ${audio_bclk_pin}

uart:
  tx_pin: ${uart_tx_pin}
  rx_pin: ${uart_rx_pin}
  id: my_uart
  baud_rate: 115200
  data_bits: 8
  stop_bits: 1
  parity: NONE
  debug:
    direction: RX
    dummy_receiver: false
    after:
      timeout: 2s
      bytes: 2048
    sequence:
      - lambda: UARTDebug::log_hex(direction, bytes, ' ');

tx_ultimate_touch:
  id: tx_touch
  uart: my_uart

  on_press:
    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_press", "Touch Position: %d / State: %d", touch.x, touch.state);

  on_release:
    - script.execute: led_on_touch

    - script.execute:
        id: handle_release
        pos: !lambda "return touch.x;"

    - switch.turn_on: vibra

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_release", "Release Position: %d / State: %d", touch.x, touch.state);

  on_swipe_left:
    - script.execute: led_on_swipe_left

    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: swipe_left
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_swipe_left", "Swipe Left Position: %d / State: %d", touch.x, touch.state);

  on_swipe_right:
    - script.execute: led_on_swipe_right

    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: swipe_right
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_swipe_right", "Swipe Right Position: %d / State: %d", touch.x, touch.state);

  on_full_touch_release:
    - script.execute: led_on_full_touch

    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: multi_touch
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_full_touch_release", "Full Touch Release Position: %d / State: %d", touch.x, touch.state);

  on_long_touch_release:
    - script.execute: led_on_long_touch

    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: long_press
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_long_touch_release", "Long Touch Release Position: %d / State: %d", touch.x, touch.state);

time:
  - platform: homeassistant
    id: homeassistant_time


script:
  - id: refresh_led_default
    mode: restart
    then:
      - lambda: "ESP_LOGD(\"refresh_led_default\", \"leds_top state preserved (HA controlled)\");"

  - id: led_on_button_left
    mode: restart
    then:
      - light.turn_on:
          id: leds_button_left
          brightness: ${button_brightness}
          red: !lambda "return id(button_color)[0]/100.0;"
          green: !lambda "return id(button_color)[1]/100.0;"
          blue:  !lambda "return id(button_color)[2]/100.0;"

  - id: led_on_button_middle
    mode: restart
    then:
      - light.turn_on:
          id: leds_button_middle
          brightness: ${button_brightness}
          red: !lambda "return id(button_color)[0]/100.0;"
          green: !lambda "return id(button_color)[1]/100.0;"
          blue:  !lambda "return id(button_color)[2]/100.0;"

#  - id: led_on_button_right
#    mode: restart
#    then:
#      - light.turn_on:
#          id: leds_button_right
#          brightness: ${button_brightness}
#          red: !lambda "return id(button_color)[0]/100.0;"
#          green: !lambda "return id(button_color)[1]/100.0;"
#          blue:  !lambda "return id(button_color)[2]/100.0;"

  - id: led_off_button_left
    mode: restart
    then:
      - light.turn_off:
          id: leds_button_left

  - id: led_off_button_middle
    mode: restart
    then:
      - light.turn_off:
          id: leds_button_middle

#  - id: led_off_button_right
#    mode: restart
#    then:
#      - light.turn_off:
#          id: leds_button_right

  - id: led_on_touch
    mode: restart
    then:
      - light.turn_on:
          id: leds_top
          brightness: ${touch_brightness}
          red: !lambda "return id(touch_color)[0]/100.0;"
          green: !lambda "return id(touch_color)[1]/100.0;"
          blue:  !lambda "return id(touch_color)[2]/100.0;"
          effect: ${touch_effect}
      - delay: 1s
      - if:
          condition:
            lambda: "return id(nightlight_switch).state;"
          then:
            # 夜間模式（ON），恢復熄滅
            - light.turn_off:
                id: leds_top
          else:
            # 夜燈常亮（OFF），恢復白色20%
            - light.turn_on:
                id: leds_top
                brightness: 0.2
                red: 1.0
                green: 1.0
                blue: 1.0

  - id: led_on_swipe_left
    mode: restart
    then:
      - light.turn_on:
          id: leds_top
          brightness: ${swipe_left_brightness}
          red: !lambda "return id(swipe_left_color)[0]/100.0;"
          green: !lambda "return id(swipe_left_color)[1]/100.0;"
          blue:  !lambda "return id(swipe_left_color)[2]/100.0;"
          effect: ${swipe_left_effect}
      - delay: 1s
      - if:
          condition:
            lambda: "return id(nightlight_switch).state;"
          then:
            - light.turn_off:
                id: leds_top
          else:
            - light.turn_on:
                id: leds_top
                brightness: 0.2
                red: 1.0
                green: 1.0
                blue: 1.0

  - id: led_on_swipe_right
    mode: restart
    then:
      - light.turn_on:
          id: leds_top
          brightness: ${swipe_right_brightness}
          red: !lambda "return id(swipe_right_color)[0]/100.0;"
          green: !lambda "return id(swipe_right_color)[1]/100.0;"
          blue:  !lambda "return id(swipe_right_color)[2]/100.0;"
          effect: ${swipe_right_effect}
      - delay: 1s
      - if:
          condition:
            lambda: "return id(nightlight_switch).state;"
          then:
            - light.turn_off:
                id: leds_top
          else:
            - light.turn_on:
                id: leds_top
                brightness: 0.2
                red: 1.0
                green: 1.0
                blue: 1.0

  - id: led_on_full_touch
    mode: restart
    then:
      - light.turn_on:
          id: leds_top
          brightness: ${multi_touch_brightness}
          red: !lambda "return id(multi_touch_color)[0]/100.0;"
          green: !lambda "return id(multi_touch_color)[1]/100.0;"
          blue:  !lambda "return id(multi_touch_color)[2]/100.0;"
          effect: ${multi_touch_effect}
      - delay: 1s
      - if:
          condition:
            lambda: "return id(nightlight_switch).state;"
          then:
            - light.turn_off:
                id: leds_top
          else:
            - light.turn_on:
                id: leds_top
                brightness: 0.2
                red: 1.0
                green: 1.0
                blue: 1.0

  - id: led_on_long_touch
    mode: restart
    then:
      - light.turn_on:
          id: leds_top
          brightness: ${long_press_brightness}
          red: !lambda "return id(long_press_color)[0]/100.0;"
          green: !lambda "return id(long_press_color)[1]/100.0;"
          blue:  !lambda "return id(long_press_color)[2]/100.0;"
          effect: ${long_press_effect}
      - delay: 1s
      - if:
          condition:
            lambda: "return id(nightlight_switch).state;"
          then:
            - light.turn_off:
                id: leds_top
          else:
            - light.turn_on:
                id: leds_top
                brightness: 0.2
                red: 1.0
                green: 1.0
                blue: 1.0

  - id: handle_release
    mode: restart
    parameters:
      pos: int
    then:
      - if:
          condition:
            lambda: "return ${relay_count}==1;"
          then:
            - binary_sensor.template.publish:
                id: touchfield_1
                state: ON

      - if:
          condition:
            lambda: "return ${relay_count}==2;"
          then:
            - if:
                condition:
                  lambda: "return pos <= 5;"
                then:
                  - binary_sensor.template.publish:
                      id: touchfield_1
                      state: ON

                else:
                  - binary_sensor.template.publish:
                      id: touchfield_2
                      state: ON

      - if:
          condition:
            lambda: "return ${relay_count}==3;"
          then:
            - if:
                condition:
                  lambda: "return pos <= 3;"
                then:
                  - binary_sensor.template.publish:
                      id: touchfield_1
                      state: ON

                else:
                  - if:
                      condition:
                        lambda: "return pos <= 7;"
                      then:
                        - binary_sensor.template.publish:
                            id: touchfield_2
                            state: ON

                      else:
                        - binary_sensor.template.publish:
                            id: touchfield_3
                            state: ON

  - id: touch_led_marker
    mode: restart
    parameters:
      state: int
      pos: int
    then:
      - if:
          condition:
            lambda: "return state==1;"
          then:
            # RELEASE
            - light.turn_off: leds

          else:
            - if:
                condition:
                  lambda: "return state==2;"
                then:
                  # TOUCH
                  - light.turn_on:
                      id: leds
                      red: 1
                      green: 0
                      blue: 0
                  - delay: 1s
                  - light.turn_off: leds

                else:
                  - if:
                      condition:
                        lambda: "return state==11;"
                      then:
                        # FULL-TOUCH RELEASE
                        - light.turn_on:
                            id: leds
                            effect: "Rainbow"
                        - delay: 1s
                        - light.turn_off: leds

                      else:
                        # SWIPE
                        - if:
                            condition:
                              lambda: "return state==13;"
                            then:
                              # SWIPE LEFT
                              - light.turn_on:
                                  id: leds
                                  red: 0
                                  green: 1
                                  blue: 0

                        - if:
                            condition:
                              lambda: "return state==12;"
                            then:
                              # SWIPE RIGHT
                              - light.turn_on:
                                  id: leds
                                  red: 0
                                  green: 0
                                  blue: 1
                        - delay: 1s
                        - light.turn_off: leds